name: Deploy to AWS

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/paceroute-pipeline:$IMAGE_TAG .
          docker tag  $ECR_REGISTRY/paceroute-pipeline:$IMAGE_TAG \
                      $ECR_REGISTRY/paceroute-pipeline:latest
          docker push $ECR_REGISTRY/paceroute-pipeline:$IMAGE_TAG
          docker push $ECR_REGISTRY/paceroute-pipeline:latest

      - name: Set up Python for CDK
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CDK dependencies
        run: pip install -r infra/requirements.txt

      - name: Install AWS CDK CLI
        run: npm install -g aws-cdk

      - name: CDK deploy
        working-directory: infra
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: cdk deploy --require-approval never
